<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宽带拆机投诉工单生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            font-size: 1.4rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        
        .voice-area {
            text-align: center;
            padding: 30px 20px;
        }
        
        .voice-btn-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 20px;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .voice-btn-large:hover {
            transform: scale(1.05);
        }
        
        .voice-btn-large.recording {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4); }
            50% { box-shadow: 0 8px 40px rgba(231, 76, 60, 0.7); }
        }
        
        .voice-btn-large svg {
            width: 40px;
            height: 40px;
        }
        
        .voice-hint {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .voice-status {
            color: #e74c3c;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
        }
        
        .result-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .result-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .result-text {
            font-family: "Consolas", "Microsoft YaHei", monospace;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            min-height: 200px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .btn-export {
            background: #27ae60;
            color: #fff;
        }
        
        .btn-export:hover {
            background: #219a52;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .tips {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .example-box {
            background: #fff;
            border-radius: 10px;
            padding: 12px 15px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        
        .example-box h4 {
            color: #667eea;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .example-box p {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .manual-input {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #e0e0e0;
        }
        
        .manual-input label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        
        .manual-input textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .manual-input textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .manual-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 宽带拆机投诉工单生成器</h1>
        
        <div class="card">
            <div class="voice-area">
                <button class="voice-btn-large" id="mainVoiceBtn" onclick="toggleVoice()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                    <span id="voiceBtnText">点击说话</span>
                </button>
                <div class="voice-hint">🎤 说出模板内容，我帮你自动解析</div>
                <div class="voice-status" id="voiceStatus"></div>
            </div>
            
            <div class="example-box">
                <h4>💡 说话示例</h4>
                <p>"投诉处理员是张三，投诉号码10086，联系电话138xxxx，安装地址西安市xx，挽留不成功，工单类别宽带拆机，处理时限48小时"</p>
            </div>
            
            <div class="manual-input">
                <label>或者直接粘贴/输入文字：</label>
                <textarea id="manualText" placeholder="在这里输入包含工单信息的文字..."></textarea>
                <button class="manual-btn" onclick="parseManualText()">🔍 解析生成</button>
            </div>
        </div>
        
        <div class="card">
            <div class="result-area">
                <div class="result-label">
                    <span>📝 生成结果</span>
                </div>
                <div class="result-text" id="resultText">【宽带拆机投诉工单反馈模板】

投诉处理员：
投诉号码：
联系电话：
安装地址：
挽留情况：
工单类别：
处理时限：</div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="clearAll()">
                    🗑️ 清空
                </button>
                <button class="btn btn-export" onclick="exportTxt()">
                    📄 导出TXT
                </button>
                <button class="btn btn-primary" onclick="copyResult()">
                    📋 复制
                </button>
            </div>
        </div>
        
        <div class="tips">
            <strong>📱 手机使用说明</strong><br>
            将此页面部署到服务器后，通过链接在浏览器打开即可使用。建议使用 Chrome 或 Safari 浏览器。
        </div>
    </div>
    
    <div class="toast" id="toast">操作成功</div>

    <script>
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        
        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast('您的浏览器不支持语音识别，请使用Chrome浏览器');
                return;
            }
            
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }
        
        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            const btn = document.getElementById('mainVoiceBtn');
            const btnText = document.getElementById('voiceBtnText');
            const status = document.getElementById('voiceStatus');
            
            btn.classList.add('recording');
            btnText.textContent = '说完点我';
            status.textContent = '🔴 正在录音...';
            isRecording = true;
            finalTranscript = '';
            
            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('manualText').value = transcript;
            };
            
            recognition.onend = function() {
                if (isRecording) {
                    recognition.start();
                }
            };
            
            recognition.onerror = function(event) {
                if (event.error !== 'no-speech') {
                    showToast('语音识别出错: ' + event.error);
                }
                stopRecording();
            };
            
            recognition.start();
        }
        
        function stopRecording() {
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            
            const btn = document.getElementById('mainVoiceBtn');
            const btnText = document.getElementById('voiceBtnText');
            const status = document.getElementById('voiceStatus');
            
            btn.classList.remove('recording');
            btnText.textContent = '点击说话';
            status.textContent = '';
            isRecording = false;
            
            // 自动解析
            const text = document.getElementById('manualText').value;
            if (text.trim()) {
                parseText(text);
            }
        }
        
        function parseManualText() {
            const text = document.getElementById('manualText').value;
            if (text.trim()) {
                parseText(text);
            } else {
                showToast('请先输入或说话');
            }
        }
        
        function parseText(text) {
            // 智能解析 - 关键词匹配
            const result = {
                complaintHandler: '',
                complaintNumber: '',
                phone: '',
                address: '',
                retention: '',
                workOrderType: '',
                deadline: ''
            };
            
            // 投诉处理员
            const handlerPatterns = [
                /(?:投诉处理员|处理员|负责人|服务员)[：:是]?\s*([^\s，,。；;电话安装挽留工单处理时限]+)/i,
                /([^\s，,。；;电话安装挽留工单处理时限]{2,4})(?:投诉|处理|负责)/
            ];
            for (const p of handlerPatterns) {
                const m = text.match(p);
                if (m) { result.complaintHandler = m[1].trim(); break; }
            }
            
            // 投诉号码
            const numberPatterns = [
                /(?:投诉号码|工单号|单号|号码)[：:是]?\s*(\d+)/i,
                /(?:号码|号)[：:是]?\s*(\d+)/
            ];
            for (const p of numberPatterns) {
                const m = text.match(p);
                if (m) { result.complaintNumber = m[1].trim(); break; }
            }
            
            // 联系电话
            const phonePatterns = [
                /(?:联系电话|电话|手机|联系方式)[：:是]?\s*((?:1[3-9]\d[\s\-]?\d{4}[\s\-]?\d{4}|\d{3,4}[\s\-]?\d{7,8}))/i,
                /(1[3-9]\d[\s\-]?\d{4}[\s\-]?\d{4})/
            ];
            for (const p of phonePatterns) {
                const m = text.match(p);
                if (m) { result.phone = m[1].trim().replace(/[\s\-]/g, ''); break; }
            }
            
            // 安装地址
            const addrPatterns = [
                /(?:安装地址|地址|装|装机地址)[：:是]?\s*([^\s，,。；;挽留工单处理时限]+)/i,
                /(?:在|到)\s*([^，,。；;挽留工单时限]{5,30})/
            ];
            for (const p of addrPatterns) {
                const m = text.match(p);
                if (m) { result.address = m[1].trim(); break; }
            }
            
            // 挽留情况
            if (/挽留.*成功|同意继续/.test(text)) {
                result.retention = '已挽留 - 用户同意继续使用';
            } else if (/未挽留|联系不上/.test(text)) {
                result.retention = '未挽留 - 联系不上用户';
            } else if (/挽留中|待回复/.test(text)) {
                result.retention = '挽留中 - 待用户回复';
            } else if (/挽留.*不?成功|坚持拆机|坚持|不.*用/.test(text)) {
                result.retention = '挽留不成功 - 用户坚持拆机';
            }
            
            // 工单类别
            if (/iptv|电视/i.test(text)) {
                result.workOrderType = 'IPTV拆机投诉';
            } else if (/固话|座机/i.test(text)) {
                result.workOrderType = '固话拆机投诉';
            } else if (/融合/i.test(text)) {
                result.workOrderType = '融合业务拆机投诉';
            } else if (/宽带/i.test(text)) {
                result.workOrderType = '宽带拆机投诉';
            }
            
            // 处理时限
            if (/24.*小时|一天/i.test(text)) {
                result.deadline = '24小时内';
            } else if (/48.*小时|两天/i.test(text)) {
                result.deadline = '48小时内';
            } else if (/72.*小时|三天/i.test(text)) {
                result.deadline = '72小时内';
            } else if (/5.*工作日|五.*工作/i.test(text)) {
                result.deadline = '5个工作日内';
            }
            
            generateTemplate(result);
        }
        
        function generateTemplate(data) {
            const template = `【宽带拆机投诉工单反馈模板】

投诉处理员：${data.complaintHandler || '(待填写)'}
投诉号码：${data.complaintNumber || '(待填写)'}
联系电话：${data.phone || '(待填写)'}
安装地址：${data.address || '(待填写)'}
挽留情况：${data.retention || '(待填写)'}
工单类别：${data.workOrderType || '(待填写)'}
处理时限：${data.deadline || '(待填写)'}`;
            
            document.getElementById('resultText').textContent = template;
            showToast('解析完成！');
        }
        
        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('复制成功！');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('复制成功！');
            });
        }
        
        function exportTxt() {
            const text = document.getElementById('resultText').textContent;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '宽带拆机投诉工单_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('导出成功！');
        }
        
        function clearAll() {
            document.getElementById('manualText').value = '';
            document.getElementById('resultText').textContent = `【宽带拆机投诉工单反馈模板】

投诉处理员：
投诉号码：
联系电话：
安装地址：
挽留情况：
工单类别：
处理时限：`;
            showToast('已清空');
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
